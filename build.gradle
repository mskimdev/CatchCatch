plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.14'
    id 'io.spring.dependency-management' version '1.1.7'
}
ext {
    springAiVersion = "1.1.8"
}

group = 'com.catchcatch'
version = '0.0.1-SNAPSHOT'
description = 'catchcatch'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {

    // WebSocket
    implementation 'org.springframework.boot:spring-boot-starter-websocket'

    // AOP (운영 로그 등)
    implementation 'org.springframework.boot:spring-boot-starter-aop'

    // Redis (대기열)
    implementation 'org.springframework.boot:spring-boot-starter-data-redis'
    // 로컬 개발 전용: 별도 Redis 서버 설치 없이 앱 기동 시 자동으로 내장 Redis 실행
    implementation 'com.github.codemonstur:embedded-redis:1.4.3'

    // CoolSMS
    implementation 'com.solapi:sdk:1.0.3'

    implementation 'org.springframework.ai:spring-ai-starter-model-anthropic'

    // 암호화
    implementation 'org.springframework.security:spring-security-crypto'
    // Source: https://mvnrepository.com/artifact/org.apache.commons/commons-lang3
    implementation group: 'org.apache.commons', name: 'commons-lang3', version: '3.18.0'
    // jsoup - HTML Sanitize (이벤트 HTML 콘텐츠 XSS 방어)
    implementation 'org.jsoup:jsoup:1.18.3'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-mustache'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-mail'
    compileOnly 'org.projectlombok:lombok'
    runtimeOnly 'com.h2database:h2'
    runtimeOnly 'com.mysql:mysql-connector-j'
    annotationProcessor 'org.projectlombok:lombok'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testCompileOnly 'org.projectlombok:lombok'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testAnnotationProcessor 'org.projectlombok:lombok'
}
dependencyManagement {
    imports {
        mavenBom "org.springframework.ai:spring-ai-bom:$springAiVersion"
    }
}

tasks.named('test') {
    useJUnitPlatform()
}
