<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body {
            margin: 0;
            background:
                radial-gradient(circle at 15% 0%, rgba(124,58,237,0.08), transparent 24%),
                radial-gradient(circle at 95% 12%, rgba(217,70,239,0.05), transparent 28%),
                #fbf9ff;
            font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", Arial, sans-serif;
        }
        .swal2-popup {
            border-radius: 28px !important;
            border: 1px solid #e6def2 !important;
            box-shadow: 0 18px 45px rgba(54,31,89,0.09) !important;
            padding: 40px 36px 36px !important;
            font-family: inherit !important;
        }
        .swal2-title {
            color: #171321 !important;
            font-size: 20px !important;
            font-weight: 950 !important;
            letter-spacing: -0.03em !important;
        }
        .swal2-html-container {
            color: #403a4f !important;
            font-size: 14px !important;
            font-weight: 700 !important;
            margin-top: 8px !important;
        }
        .swal2-confirm {
            background: linear-gradient(135deg, #7c3aed, #4c1d95) !important;
            border-radius: 14px !important;
            height: 48px !important;
            padding: 0 28px !important;
            font-size: 15px !important;
            font-weight: 900 !important;
            box-shadow: 0 15px 28px rgba(76,29,149,0.24) !important;
            border: none !important;
            letter-spacing: -0.02em !important;
        }
        .swal2-confirm:hover {
            transform: translateY(-1px) !important;
            box-shadow: 0 18px 34px rgba(76,29,149,0.28) !important;
        }
        .swal2-actions { margin-top: 28px !important; }
    </style>
</head>
<body>
<script>
    Swal.fire({
        icon: 'warning',
        title: '접근 권한 없음',
        html: '관리자만 접근할 수 있는 페이지입니다.',
        confirmButtonText: '홈으로',
        allowOutsideClick: false
    }).then(() => {
        location.href = '/';
    });
</script>
</body>
</html>
