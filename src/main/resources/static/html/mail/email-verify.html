<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body style="margin:0;padding:0;background:#f3f4f6;font-family:'Apple SD Gothic Neo',Arial,sans-serif">
  <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 16px">
    <tr><td align="center">
      <table width="520" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(76,29,149,.10)">

        <!-- 헤더 -->
        <tr>
          <td style="background:linear-gradient(135deg,#7c3aed,#4c1d95);padding:36px 40px 32px;text-align:center">
            <div style="font-size:26px;font-weight:900;color:#fff;letter-spacing:-0.5px">🎟 CatchCatch</div>
            <div style="margin-top:8px;font-size:14px;color:rgba(255,255,255,.75);font-weight:600">이메일 인증 코드</div>
          </td>
        </tr>

        <!-- 본문 -->
        <tr>
          <td style="padding:40px 40px 32px">
            <p style="margin:0 0 8px;font-size:15px;color:#374151;font-weight:700">안녕하세요!</p>
            <p style="margin:0 0 28px;font-size:14px;color:#6b7280;line-height:1.7">
              CatchCatch 회원가입을 위한 이메일 인증 코드입니다.<br>
              아래 코드를 3분 이내에 입력해 주세요.
            </p>

            <!-- 인증 코드 박스 -->
            <div style="background:#f7f1ff;border:2px solid #ede9fe;border-radius:16px;padding:28px 20px;text-align:center;margin-bottom:28px">
              <div style="font-size:13px;color:#7c3aed;font-weight:800;letter-spacing:1px;margin-bottom:12px">인증 코드</div>
              <div style="font-size:42px;font-weight:900;letter-spacing:12px;color:#4c1d95;font-variant-numeric:tabular-nums">{{code}}</div>
              <div style="margin-top:14px;font-size:12px;color:#9ca3af;font-weight:600">⏱ 유효 시간: <strong style="color:#ef4444">3분</strong></div>
            </div>

            <p style="margin:0;font-size:13px;color:#9ca3af;line-height:1.7">
              본인이 요청하지 않으셨다면 이 메일을 무시해 주세요.<br>
              코드는 타인에게 절대 알려주지 마세요.
            </p>
          </td>
        </tr>

        <!-- 푸터 -->
        <tr>
          <td style="background:#f9fafb;border-top:1px solid #f3f4f6;padding:20px 40px;text-align:center">
            <div style="font-size:12px;color:#9ca3af">© 2025 CatchCatch. All rights reserved.</div>
          </td>
        </tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
