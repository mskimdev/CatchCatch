spring:
  profiles:
    active:
      - local
  config:
    import: optional:file:.env[.properties]

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-haiku-4-5-20251001
    retry:
      max-attempts: 2

springdoc:
  swagger-ui:
    enabled: true
    path:
      - /swagger-ui.html
  api-docs:
    path:
      - /v3/api-docs

portone:
  store-id: ${PORTONE_STORE_ID}
  api-secret: ${PORTONE_API_SECRET}
  channel:
    card: ${PORTONE_CARD_CHANNEL_KEY:}
    kakaopay: ${PORTONE_KAKAOPAY_CHANNEL_KEY:}
    tosspay: ${PORTONE_TOSSPAY_CHANNEL_KEY:}
    vbank: ${PORTONE_VBANK_CHANNEL_KEY:}

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    admin-key: ${KAKAO_ADMIN_KEY}
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}

kakao:
  map:
    js-key: ${KAKAO_MAP_JS_KEY}

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

catchcatch:
  key: ${CATCHCATCH_KEY}
  loadtest-api-key: ${LOADTEST_API_KEY:loadtest-secret}
  queue:
    concurrency-limit: 500

sol:
  key: ${SOL_API_KEY}
  secret: ${SOL_API_SECRET}
  sender: ${SOL_SENDER}

