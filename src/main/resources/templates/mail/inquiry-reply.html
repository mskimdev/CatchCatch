<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body style="margin:0;padding:0;background:#f3f4f6;font-family:'Apple SD Gothic Neo',Arial,sans-serif">
  <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 16px">
    <tr><td align="center">
      <table width="520" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(76,29,149,.10)">

        <!-- 헤더 -->
        <tr>
          <td style="background:linear-gradient(135deg,#7c3aed,#4c1d95);padding:36px 40px 32px;text-align:center">
            <div style="font-size:26px;font-weight:900;color:#fff;letter-spacing:-0.5px">🎟 CatchCatch</div>
            <div style="margin-top:8px;font-size:14px;color:rgba(255,255,255,.75);font-weight:600">1:1 문의 답변 안내</div>
          </td>
        </tr>

        <!-- 본문 -->
        <tr>
          <td style="padding:40px 40px 32px">
            <p style="margin:0 0 6px;font-size:15px;color:#374151;font-weight:700">{{username}}님, 안녕하세요!</p>
            <p style="margin:0 0 28px;font-size:14px;color:#6b7280;line-height:1.7">
              문의하신 내용에 대한 답변이 등록되었습니다.<br>
              아래 내용을 확인해 주세요.
            </p>

            <!-- 문의 제목 -->
            <div style="background:#f7f1ff;border-left:4px solid #7c3aed;border-radius:0 8px 8px 0;padding:14px 18px;margin-bottom:20px">
              <div style="font-size:11px;color:#7c3aed;font-weight:800;letter-spacing:1px;margin-bottom:4px">
                <svg viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" style="width:13px;height:13px;vertical-align:-2px;margin-right:5px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                문의 제목
              </div>
              <div style="font-size:14px;color:#374151;font-weight:600">{{title}}</div>
            </div>

            <!-- 답변 내용 박스 -->
            <div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:12px;padding:24px;margin-bottom:28px">
              <div style="font-size:11px;color:#7c3aed;font-weight:800;letter-spacing:1px;margin-bottom:12px">
                <svg viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" style="width:13px;height:13px;vertical-align:-2px;margin-right:5px"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                답변 내용
              </div>
              <div style="font-size:14px;color:#374151;line-height:1.8;white-space:pre-wrap">{{reply}}</div>
            </div>

            <p style="margin:0;font-size:13px;color:#9ca3af;line-height:1.7">
              추가로 궁금한 점이 있으시면 고객센터 1:1 문의를 이용해 주세요.<br>
              항상 최선을 다해 도와드리겠습니다.
            </p>
          </td>
        </tr>

        <!-- 푸터 -->
        <tr>
          <td style="background:#f9fafb;border-top:1px solid #f3f4f6;padding:20px 40px;text-align:center">
            <div style="font-size:12px;color:#9ca3af">© 2026 CatchCatch. All rights reserved.</div>
          </td>
        </tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
